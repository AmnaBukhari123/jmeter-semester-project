name: JMeter Performance Tests

on:
  push:
    branches: [ main ]

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apache JMeter
        run: |
          wget -q https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter

      - name: Verify repository files
        run: |
          echo "ROOT:"
          ls

          echo "TESTS FOLDER:"
          ls tests

      - name: Run Performance Tests
        run: |
          mkdir -p results

          jmeter/bin/jmeter -n \
            -t tests/load_test.jmx \
            -l results/results.csv \
            -Jjmeter.save.saveservice.output_format=csv \
            -j results/jmeter.log

      - name: Show Results File
        run: |
          echo "RESULTS:"
          head results/results.csv

      - name: Generate HTML Report
        run: |
          mkdir -p reports

          jmeter/bin/jmeter \
            -g results/results.csv \
            -o reports

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-report
          path: reports/

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-logs
          path: results/