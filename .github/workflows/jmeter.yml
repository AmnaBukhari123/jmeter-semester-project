name: JMeter Performance Tests

on:
  push:
    branches: [ main ]

jobs:
  performance-test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apache JMeter
        run: |
          wget -q https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter

      - name: Create test data file for CI
        run: |
          mkdir -p test_data
          echo "post_id,expected_code" > test_data/test_data.csv
          echo "1,200" >> test_data/test_data.csv
          echo "2,200" >> test_data/test_data.csv
          echo "3,200" >> test_data/test_data.csv

      - name: Fix JMX file to use correct CSV path
        run: |
          sed -i 's|C:/Documents/test_data.csv|test_data/test_data.csv|g' tests/load_test.jmx

      - name: Debug Repository Structure
        run: |
          echo "ROOT:"
          ls -la
          echo "TESTS:"
          ls -la tests/
          echo "TEST DATA:"
          cat test_data/test_data.csv

      - name: Run JMeter Test
        run: |
          mkdir -p results
          mkdir -p reports

          jmeter/bin/jmeter -n \
            -t tests/load_test.jmx \
            -l results/results.csv \
            -e \
            -o reports \
            -Jjmeter.save.saveservice.output_format=csv \
            -j results/jmeter.log

      - name: Show JMeter Log
        if: always()
        run: |
          echo "===== JMETER LOG ====="
          if [ -f results/jmeter.log ]; then
            cat results/jmeter.log
          else
            echo "No log file found"
          fi

      - name: Show Results File
        if: always()
        run: |
          echo "===== RESULTS ====="
          if [ -f results/results.csv ]; then
            head -20 results/results.csv
            echo ""
            echo "Total lines: $(wc -l < results/results.csv)"
          else
            echo "No results file found"
          fi

      - name: Verify Report Generation
        if: always()
        run: |
          echo "===== REPORTS FOLDER ====="
          if [ -d reports ]; then
            ls -la reports/
            ls -la reports/ || true
          else
            echo "Reports folder does not exist"
          fi

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-report
          path: reports/

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-logs
          path: results/