name: JMeter Performance Tests

on:
  push:
    branches: [ main ]

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apache JMeter
        run: |
          wget -q https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter

      - name: Verify files
        run: |
          ls
          ls tests

      - name: Run Performance Tests
        run: |
          mkdir -p results
          jmeter/bin/jmeter -n \
            -t tests/load_test.jmx \
            -l results/results.jtl

      - name: Generate HTML Report
        run: |
          mkdir -p reports

          echo "Checking results file..."

          if [ ! -f results/results.jtl ]; then
            echo "results.jtl not found"
            exit 1
          fi

          cat results/results.jtl | head

          jmeter/bin/jmeter -g results/results.jtl -o reports || true

      - name: Upload HTML Report as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-report
          path: reports/